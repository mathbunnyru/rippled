version: 2
updates:
  - package-ecosystem: github-actions
    directories:
      - /
      - .github/actions/build-deps/
      - .github/actions/generate-version/
      - .github/actions/set-compiler-env/
      - .github/actions/setup-conan/
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Etc/GMT
    commit-message:
      prefix: "ci: [DEPENDABOT] "
    target-branch: develop
