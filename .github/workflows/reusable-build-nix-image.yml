# Build a single-platform Nix Docker image for one distro. On push, the
# image is pushed to GHCR with arch-suffixed tags (e.g. `:latest-amd64`,
# `:sha-abc-amd64`) so the calling workflow can stitch per-arch builds
# into a multi-arch manifest without needing to pass digests around.
name: Reusable build Nix Docker image (single platform)

on:
  workflow_call:
    inputs:
      distro:
        description: "Distro short name (nixos, ubuntu, rhel, debian)"
        required: true
        type: string
      platform:
        description: "Docker platform string, e.g. linux/amd64"
        required: true
        type: string
      runner:
        description: "GitHub Actions runner label to build on"
        required: true
        type: string
      push:
        description: "Whether to push the image to GHCR"
        required: true
        type: boolean

defaults:
  run:
    shell: bash

env:
  UBUNTU_VERSION: "20.04"
  RHEL_VERSION: "9"
  DEBIAN_VERSION: "bookworm"

jobs:
  build:
    name: Build (${{ inputs.platform }})
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Determine base image and arch
        id: vars
        run: |
          case "${{ inputs.distro }}" in
            nixos)
              echo "base_image=nixos/nix:latest" >> $GITHUB_OUTPUT
              ;;
            ubuntu)
              echo "base_image=ubuntu:${UBUNTU_VERSION}" >> $GITHUB_OUTPUT
              ;;
            rhel)
              echo "base_image=registry.access.redhat.com/ubi${RHEL_VERSION}/ubi:latest" >> $GITHUB_OUTPUT
              ;;
            debian)
              echo "base_image=debian:${DEBIAN_VERSION}" >> $GITHUB_OUTPUT
              ;;
          esac

          platform="${{ inputs.platform }}"
          echo "arch=${platform##*/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/xrplf/ci/nix-${{ inputs.distro }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
          flavor: |
            suffix=-${{ steps.vars.outputs.arch }},onlatest=true

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/nix.Dockerfile
          platforms: ${{ inputs.platform }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BASE_IMAGE=${{ steps.vars.outputs.base_image }}
