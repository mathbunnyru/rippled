name: Check PR title

on:
  merge_group:
    types:
      - checks_requested
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]
    branches: [develop]

jobs:
  check_title:
    if: ${{ github.event.pull_request.draft != true }}
