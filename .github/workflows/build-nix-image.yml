name: Build Nix Docker image

on:
  push:
    branches:
      - develop
    paths:
      - ".github/workflows/build-nix-image.yml"
      - ".github/workflows/reusable-build-nix-image.yml"
      - "docker/nix.Dockerfile"
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
  pull_request:
    paths:
      - ".github/workflows/build-nix-image.yml"
      - ".github/workflows/reusable-build-nix-image.yml"
      - "docker/nix.Dockerfile"
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.distro }} (${{ matrix.platform.platform }})
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        distro: [nixos, ubuntu, rhel, debian]
        platform:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    uses: ./.github/workflows/reusable-build-nix-image.yml
    with:
      distro: ${{ matrix.distro }}
      platform: ${{ matrix.platform.platform }}
      runner: ${{ matrix.platform.runner }}
      push: ${{ github.event_name == 'push' }}

  merge:
    name: Merge ${{ matrix.distro }} manifest
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        distro: [nixos, ubuntu, rhel, debian]
    env:
      IMAGE_NAME: ghcr.io/xrplf/ci/nix-${{ matrix.distro }}

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        run: |
          for tag in $(jq -cr '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON"); do
            docker buildx imagetools create -t "$tag" "${tag}-amd64" "${tag}-arm64"
          done

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${{ steps.meta.outputs.version }}"
